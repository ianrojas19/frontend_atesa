<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="ConneXtion - Portal de Soporte">
        <meta name="author" content="ConneXtion">

        <title>ConneXtion - Acceso de Soporte</title>

        <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
        <link href="css/sb-admin-2.min.css" rel="stylesheet">

        <style>
            .bg-login-brand {
                background: linear-gradient(160deg, #0d2b6b 0%, #1a5aad 55%, #2596e1 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem;
                position: relative;
                overflow: hidden;
                min-height: 420px;
            }
            .bg-login-brand::before {
                content: "";
                position: absolute;
                width: 350px;
                height: 350px;
                border-radius: 50%;
                border: 2px solid rgba(255,255,255,0.08);
                top: -80px;
                left: -80px;
            }
            .bg-login-brand::after {
                content: "";
                position: absolute;
                width: 250px;
                height: 250px;
                border-radius: 50%;
                border: 2px solid rgba(255,255,255,0.06);
                bottom: -60px;
                right: -60px;
            }
            .brand-logo-wrapper {
                background: rgba(255,255,255,0.12);
                border-radius: 20px;
                padding: 24px 32px;
                margin-bottom: 1.5rem;
                backdrop-filter: blur(6px);
                border: 1px solid rgba(255,255,255,0.2);
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                z-index: 1;
            }
            .brand-logo-wrapper img {
                max-width: 200px;
                width: 100%;
                display: block;
            }
            .brand-tagline {
                color: rgba(255,255,255,0.90);
                font-size: 0.85rem;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                z-index: 1;
                margin-top: 0.5rem;
            }
            .brand-subtitle {
                color: rgba(255,255,255,0.65);
                font-size: 0.75rem;
                letter-spacing: 0.05em;
                margin-top: 0.3rem;
                z-index: 1;
            }
            .login-title {
                color: #1a3a6b;
                font-weight: 800;
            }
            .form-control.is-invalid {
                border-color: #e74a3b;
            }
            .form-control.is-invalid:focus {
                box-shadow: 0 0 0 0.2rem rgba(231,74,59,0.25);
            }
            .invalid-feedback {
                display: block;
                font-size: 0.80rem;
            }
            #btnLogin {
                font-weight: 700;
                letter-spacing: 0.05em;
                transition: opacity 0.2s;
            }
            #btnLogin:disabled {
                opacity: 0.75;
                cursor: not-allowed;
            }
            #alertContainer {
                display: none;
            }
            #alertContainer .alert {
                border-radius: 8px;
                font-size: 0.875rem;
            }
            .role-badge {
                display: none;
                margin-top: 0.5rem;
            }
        </style>
    </head>

    <body class="bg-gradient-primary">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-10 col-lg-12 col-md-9">

                    <div class="card o-hidden border-0 shadow-lg my-5">
                        <div class="card-body p-0">
                            <div class="row">

                                <div class="col-lg-6 d-none d-lg-flex bg-login-brand">
                                    <div class="brand-logo-wrapper">
                                        <img src="img/logo_ConneXtion.png" alt="ConneXtion Logo">
                                    </div>
                                    <span class="brand-tagline">Portal de Soporte</span>
                                    <span class="brand-subtitle">Acceso para dar soporte a nuestros clientes</span>
                                </div>

                                <div class="col-lg-6">
                                    <div class="p-5">

                                        <div class="text-center mb-4">
                                            <h1 class="h4 login-title">Acceso de Soporte</h1>
                                            <p class="text-muted small">Ingrese sus credenciales para continuar</p>
                                        </div>

                                        <div id="alertContainer"></div>

                                        <form id="loginForm" class="user" novalidate>

                                            <div class="form-group">
                                                <label for="inputEmail" class="small font-weight-bold text-gray-800 mb-1">
                                                    Correo electrónico
                                                </label>
                                                <input
                                                    type="email"
                                                    class="form-control form-control-user"
                                                    id="inputEmail"
                                                    name="email"
                                                    autocomplete="email"
                                                    placeholder="Correo electrónico">
                                            </div>

                                            <div class="form-group">
                                                <label for="inputPassword" class="small font-weight-bold text-gray-800 mb-1">
                                                    Contraseña
                                                </label>
                                                <input
                                                    type="password"
                                                    class="form-control form-control-user"
                                                    id="inputPassword"
                                                    name="password"
                                                    autocomplete="current-password"
                                                    placeholder="Contraseña">
                                            </div>

                                            <button
                                                type="submit"
                                                id="btnLogin"
                                                class="btn btn-primary btn-user btn-block">
                                                <i class="fas fa-sign-in-alt mr-2"></i>Iniciar sesión
                                            </button>

                                            <hr>
                                        </form>

                                        <hr>
                                        <div class="text-center">
                                            <a class="small" href="register.html">¿No tiene cuenta? Regístrese</a>
                                        </div>

                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <script src="vendor/jquery/jquery.min.js"></script>
        <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
        <script src="js/sb-admin-2.min.js"></script>
        <script src="js/auth.js"></script>

    </body>

</html>
