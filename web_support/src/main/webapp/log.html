<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>ConneXtion - Bitácoras y Seguimiento</title>
        <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
        <link href="css/sb-admin-2.min.css" rel="stylesheet">
    </head>
    <body id="page-top">

        <div id="wrapper">

            <!-- Sidebar -->
            <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
                <a class="sidebar-brand d-flex align-items-center justify-content-center" href="index.html">
                    <div class="sidebar-brand-icon rotate-n-15">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div class="sidebar-brand-text mx-3">ConneXtion</div>
                </a>
                
                <!-- Divider -->
                <hr class="sidebar-divider my-0">

                <!-- Nav Item - Dashboard -->
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="fas fa-fw fa-tachometer-alt"></i>
                        <span>Inicio</span>
                    </a>
                </li>

                <!-- Divider -->
                <hr class="sidebar-divider">

                <!-- Heading -->
                <div class="sidebar-heading">
                    Gestión
                </div>
                
                <li class="nav-item">
                    <a class="nav-link" href="issues-list.html">
                        <i class="fas fa-fw fa-list"></i>
                        <span>Solicitudes Registradas</span>
                    </a>
                </li>
                
                <!-- Heading -->
                <div class="sidebar-heading">
                    Registro
                </div>

                <!-- Nav Item - Bitácoras -->
                <li class="nav-item active">
                    <a class="nav-link" href="log.html">
                        <i class="fas fa-fw fa-book"></i>
                        <span>Ver bitácoras</span>
                    </a>
                </li>
                
                <hr class="sidebar-divider d-none d-md-block">
                
                <li class="nav-item mt-auto px-3 mb-3">
                    <button id="btnLogout" type="button" class="btn btn-danger btn-block">
                        <i class="fas fa-sign-out-alt mr-2"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </li>
                
                <div class="text-center d-none d-md-inline">
                    <button class="rounded-circle border-0" id="sidebarToggle"></button>
                </div>
            </ul>

            <div id="content-wrapper" class="d-flex flex-column">
                <div id="content">

                    <!-- Topbar -->
                    <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                        <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                            <i class="fa fa-bars"></i>
                        </button>
                        <h5 class="m-0 font-weight-bold text-primary ml-3">Bitácoras y seguimiento de cambios </h5>
                        <ul class="navbar-nav ml-auto">
                            <!-- Nav Item - User Information -->
                            <li class="nav-item dropdown no-arrow">
                                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <div class="d-none d-lg-flex flex-column align-items-end mr-2">
                                        <span id="sessionUserName" class="text-gray-600 small font-weight-bold"></span>
                                        <span id="sessionUserRole" class="text-gray-600 small font-weight-bold" style="font-size: 0.70rem;"></span>
                                    </div>
                                    <img class="img-profile rounded-circle" src="img/undraw_profile.svg">
                                </a>
                            </li>
                        </ul>
                    </nav>

                    <!-- Contenido principal -->
                    <div class="container-fluid">

                        <!-- Acciones superiores (Filtros y Reiniciar) -->
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                            <form class="form-inline mt-2">
                                <div class="input-group mr-3">
                                    <input type="text" id="searchInput" class="form-control bg-white border-1 small" placeholder="Buscar por ID o contenido..." aria-label="Search" aria-describedby="basic-addon2">
                                    <div class="input-group-append">
                                        <button class="btn btn-primary" type="button">
                                            <i class="fas fa-search fa-sm"></i>
                                        </button>
                                    </div>
                                </div>
                                <select id="filterSelect" class="form-control mr-3 border-1 bg-white">
                                    <option value="ALL">Todos los registros</option>
                                    <option value="ISSUE">Sobre solicitudes</option>
                                    <option value="SESSION">Sobre Sesiones (Inicio/Cierre)</option>
                                </select>
                            </form>
                            <button id="btnRestartLogs" class="btn btn-danger mt-2">
                                <i class="fas fa-trash-alt mr-1"></i> Reiniciar Registros
                            </button>
                        </div>
                        
                        <div id="actionMsg"></div>

                        <!-- Tabla de bitácoras -->
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">Registros Recientes</h6>
                            </div>
                            <div class="card-body">
                                <div id="loadingMsg" class="text-center py-4">
                                    <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
                                    <p class="mt-2 text-gray-600">Cargando bitácoras...</p>
                                </div>
                                <div class="table-responsive d-none" id="tableContainer">
                                    <table class="table table-bordered table-hover" id="logsTable" width="100%" cellspacing="0">
                                        <thead class="thead-light">
                                            <tr>
                                                <th style="width: 15%">Fecha/Hora</th>
                                                <th style="width: 10%">ID bitacora</th>
                                                <th style="width: 15%">solicitud ID</th>
                                                <th style="width: 20%">Persona</th>
                                                <th style="width: 40%">Descripción</th>
                                            </tr>
                                        </thead>
                                        <tbody id="logsTableBody">
                                        </tbody>
                                    </table>
                                </div>
                                <div id="emptyMsg" class="text-center py-4 d-none">
                                    <i class="fas fa-book-open fa-3x text-gray-300"></i>
                                    <p class="mt-2 text-gray-500">No hay registros de bitácoras.</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <footer class="sticky-footer bg-white">
                    <div class="container my-auto">
                        <div class="copyright text-center my-auto">
                            <span>Copyright &copy; ConneXtion 2026</span>
                        </div>
                    </div>
                </footer>
            </div>
        </div>

        <a class="scroll-to-top rounded" href="#page-top">
            <i class="fas fa-angle-up"></i>
        </a>

        <script src="vendor/jquery/jquery.min.js"></script>
        <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
        <script src="js/sb-admin-2.min.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/log.js"></script>
    </body>
</html>
