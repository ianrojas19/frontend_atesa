<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de solicitud</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div id="detailAlert"></div>

        <div class="card shadow mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">Detalle de solicitud</h6>
                <a href="issue-history.html" class="btn btn-sm btn-secondary">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <strong>Numero de solicitud</strong>
                        <div id="issueNumber">Cargando...</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <strong>Fecha y hora de registro</strong>
                        <div id="issueDate">Cargando...</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <strong>Estado</strong>
                        <div id="issueStatus">Cargando...</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <strong>Servicio</strong>
                        <div id="issueService">Cargando...</div>
                    </div>
                    <div class="col-12 mb-3">
                        <strong>Descripcion</strong>
                        <p id="issueDescription" class="mb-0">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Comentarios actuales</h6>
            </div>
            <div class="card-body">
                <div id="commentsList" class="mb-4">
                    <p class="text-muted mb-0">Cargando comentarios...</p>
                </div>

                <form id="commentForm">
                    <div class="form-group">
                        <label for="commentText">Agregar comentario</label>
                        <textarea id="commentText" class="form-control" rows="4" maxlength="1000" required></textarea>
                        <div class="invalid-feedback">Ingrese un comentario.</div>
                    </div>
                    <button id="btnAddComment" type="submit" class="btn btn-primary">
                        <i class="fas fa-comment-medical"></i> Agregar comentario
                    </button>
                </form>
            </div>
        </div>

        <!-- CHAT INTERFACE -->
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary"><i class="fas fa-comments"></i> Chat en tiempo real</h6>
            </div>
            <div class="card-body">
                <div id="chatMessages" class="mb-3 p-3 border rounded" style="height: 300px; overflow-y: auto; background-color: #f8f9fc;">
                    <div class="text-center text-muted small">Cargando chat...</div>
                </div>
                <form id="chatForm" class="d-flex">
                    <input type="text" id="chatInput" class="form-control mr-2" placeholder="Escribe un mensaje..." required>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/issue-detail.js"></script>
</body>
</html>
