<!DOCTYPE html>
<html lang="es">

    <head>

        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="Atesa - Sistema de Gestión de Averías">
        <meta name="author" content="">

        <title>Atesa - Dashboard</title>

        <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
        <link href="css/sb-admin-2.min.css" rel="stylesheet">

    </head>

    <body id="page-top">

        <div id="wrapper">

            <!-- Sidebar -->
            <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">

                <!-- Sidebar - Brand -->
                <a class="sidebar-brand d-flex align-items-center justify-content-center" href="index.html">
                    <div class="sidebar-brand-icon rotate-n-15">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div class="sidebar-brand-text mx-3">CONNEXTION</div>
                </a>

                <!-- Divider -->
                <hr class="sidebar-divider my-0">

                <!-- Nav Item - Dashboard -->
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="fas fa-fw fa-tachometer-alt"></i>
                        <span>Inicio</span>
                    </a>
                </li>

                <!-- Divider -->
                <hr class="sidebar-divider">

                <!-- Heading -->
                <div class="sidebar-heading">
                    Operaciones
                </div>

                <!-- Nav Item - Reportar Avería -->
                <li class="nav-item active">
                    <a class="nav-link" href="report-breakdown.html">
                        <i class="fas fa-fw fa-exclamation-triangle"></i>
                        <span>Reportar Avería</span>
                    </a>
                </li>

                <!-- Divider -->
                <hr class="sidebar-divider d-none d-md-block">

                <!-- Sidebar Toggler (Sidebar) -->
                <div class="text-center d-none d-md-inline">
                    <button class="rounded-circle border-0" id="sidebarToggle"></button>
                </div>

                <!-- Logout Button -->
                <div class="mt-auto px-3 mb-3">
                    <button id="btnLogout" type="button" class="btn btn-danger btn-block">
                        <i class="fas fa-sign-out-alt mr-2"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </div>

            </ul>
            <!-- End of Sidebar -->

            <!-- Content Wrapper -->
            <div id="content-wrapper" class="d-flex flex-column">

                <!-- Main Content -->
                <div id="content">

                    <!-- Topbar -->
                    <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

                        <!-- Sidebar Toggle (Topbar) -->
                        <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                            <i class="fa fa-bars"></i>
                        </button>

                        <!-- Topbar Title -->
                        <h5 class="m-0 font-weight-bold text-gray-800">Reportar Avería</h5>

                        <!-- Topbar Navbar -->
                        <ul class="navbar-nav ml-auto">
                            <div class="topbar-divider d-none d-sm-block"></div>

                            <!-- Nav Item - User Information -->
                            <li class="nav-item dropdown no-arrow">
                                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <span id="sessionUserName" class="mr-2 d-none d-lg-inline text-gray-600 small">Usuario</span>
                                    <img class="img-profile rounded-circle" src="img/undraw_profile.svg">
                                </a>
                            </li>
                        </ul>

                    </nav>
                    <!-- End of Topbar -->

                    <!-- Begin Page Content -->
                    <div class="container-fluid">

                        <!-- Page Heading -->
                        <div class="d-sm-flex align-items-center justify-content-between mb-4">
                            <h1 class="h3 mb-0 text-gray-800">Gestión de Solicitudes</h1>
                            <a href="issue-history.html" class="d-none d-sm-inline-block btn btn-sm btn-info shadow-sm">
                                <i class="fas fa-list fa-sm text-white-50"></i> Ver Historial
                            </a>
                        </div>

                        <!-- Breakdown Report Form Container -->
                        <div class="row justify-content-center">
                            <div class="col-lg-8">
                                <div class="card shadow mb-4">
                                    <div class="card-header py-3">
                                        <h6 class="m-0 font-weight-bold text-primary">Formulario de Averías</h6>
                                    </div>
                                    <div class="card-body">
                                        <div id="alertContainer"></div>
                                        <form id="formRequest">

                                            <div class="form-group mb-3">
                                                <label for="description" class="font-weight-bold text-gray-800">
                                                    Descripción del Problema <span class="text-danger">*</span>
                                                </label>
                                                <textarea id="description" class="form-control" rows="3" required placeholder="Describa el problema detectado o la avería..."></textarea>
                                            </div>

                                            <div class="row">
                                                <div class="col-md-6 form-group mb-3">
                                                    <label for="contactPhone" class="font-weight-bold text-gray-800">
                                                        Teléfono de Contacto <span class="text-danger">*</span>
                                                    </label>
                                                    <input type="text" id="contactPhone" class="form-control" placeholder="+506 8888-8888" required>
                                                </div>
                                                <div class="col-md-6 form-group mb-3">
                                                    <label for="contactEmail" class="font-weight-bold text-gray-800">
                                                        Correo Electrónico <span class="text-danger">*</span>
                                                    </label>
                                                    <input type="email" id="contactEmail" class="form-control" placeholder="correo@example.com" required>
                                                </div>
                                            </div>

                                            <div class="form-group mb-3">
                                                <label for="address" class="font-weight-bold text-gray-800">
                                                    Dirección Exacta del Incidente <span class="text-danger">*</span>
                                                </label>
                                                <input type="text" id="address" class="form-control" placeholder="Provincia, Cantón, Distrito, detalles de referencia..." required>
                                            </div>

                                            <div class="form-group mb-3">
                                                <label for="service" class="font-weight-bold text-gray-800">
                                                    Servicio Afectado <span class="text-danger">*</span>
                                                </label>
                                                <select class="form-control" id="service" required>
                                                    <option value="">-- Seleccione un servicio --</option>
                                                    <option value="1">Internet</option>
                                                    <option value="2">Cable</option>
                                                    <option value="3">Telefonía Fija</option>
                                                    <option value="4">Telefonía Móvil</option>
                                                </select>
                                            </div>

                                            <button type="submit" class="btn btn-primary btn-user btn-block font-weight-bold">
                                                <i class="fas fa-paper-plane mr-2"></i>Enviar Informe
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    <!-- /.container-fluid -->

                </div>
                <!-- End of Main Content -->

                <!-- Footer -->
                <footer class="sticky-footer bg-white">
                    <div class="container my-auto">
                        <div class="copyright text-center my-auto">
                            <span>Copyright &copy; Atesa 2026</span>
                        </div>
                    </div>
                </footer>
                <!-- End of Footer -->

            </div>
            <!-- End of Content Wrapper -->

        </div>
        <!-- End of Page Wrapper -->

        <!-- Scroll to Top Button-->
        <a class="scroll-to-top rounded" href="#page-top">
            <i class="fas fa-angle-up"></i>
        </a>

        <!-- Bootstrap core JavaScript-->
        <script src="vendor/jquery/jquery.min.js"></script>
        <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <!-- Core plugin JavaScript-->
        <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

        <!-- Custom scripts for all pages-->
        <script src="js/sb-admin-2.min.js"></script>

        <!-- Form and Services Scripts -->
        <script src="js/services-loader.js"></script>
        <script src="js/form-handler.js"></script>
        <script src="js/auth.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                loadServicesIntoSelect('service');
            });
        </script>

    </body>

</html>
